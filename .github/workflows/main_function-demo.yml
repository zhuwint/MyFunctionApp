# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - function-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet publish --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDEB10547BD44467AF0DCEE2E1CAAA10 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0609BBA0BA5B4C91B65E5D28C56E49FA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_688B0A77F598422E82BE7611CEB440A5 }}

      - name: 'Create deployment package'
        shell: pwsh
        run: |
          Push-Location output
          $items = Get-ChildItem -Path . -Force
          Compress-Archive -LiteralPath $items -DestinationPath ../deploy.zip -Force
          Pop-Location

      - name: 'Deploy to Azure Functions'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'function-demo'
          package: ./deploy.zip
          method: 'zipdeploy'